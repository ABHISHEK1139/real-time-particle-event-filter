name: CI Pipeline (Physics Validations)

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v3

    - name: Set up Python 3.10
      uses: actions/setup-python@v4
      with:
        python-version: "3.10"

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install torch torchvision torchaudio --index-url https://download.pytorch.org/whl/cpu
        pip install torch_geometric

    - name: Mock Dataset Generation (CI Limit)
      run: |
        # Generate the full 21-column Dimuon payload structure natively to prevent CI Git bloat
        python -c "
        import pandas as pd
        import numpy as np
        
        n = 100
        columns = ['Run', 'Event', 'type1', 'E1', 'px1', 'py1', 'pz1', 'pt1', 'eta1', 'phi1', 'Q1', 
                   'type2', 'E2', 'px2', 'py2', 'pz2', 'pt2', 'eta2', 'phi2', 'Q2', 'M']
                   
        df = pd.DataFrame(np.random.rand(n, len(columns)), columns=columns)
        
        # Override specific critical physics bound values 
        df['pt1'] = np.random.uniform(20, 100, n)
        df['pt2'] = np.random.uniform(20, 100, n)
        df['eta1'] = np.random.uniform(-2, 2, n)
        df['eta2'] = np.random.uniform(-2, 2, n)
        df['phi1'] = np.random.uniform(-3.14, 3.14, n)
        df['phi2'] = np.random.uniform(-3.14, 3.14, n)
        df['M'] = np.random.uniform(60, 120, n)
        
        df.to_csv('Dimuon_DoubleMu.csv', index=False)
        "

    - name: Execute Model Generation
      run: |
        python src/data_download.py
        python src/train_model.py
        
    - name: Run Formal Pytest Suite
      run: |
        python -m pytest tests/test_pipeline.py -v
